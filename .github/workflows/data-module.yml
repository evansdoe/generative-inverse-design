# Data Module pipeline — mirrors src/data-module/.gitlab-ci.yml
# Called by ci.yml (root orchestrator). Can also be triggered manually.

name: Data Module

on:
  workflow_call:
  workflow_dispatch:

env:
  WORKING_DIR: src/data-module
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}/data_module

defaults:
  run:
    working-directory: src/data-module

jobs:
  # --------------------------------------------------------------------------
  # Stage: sast
  # --------------------------------------------------------------------------
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # --------------------------------------------------------------------------
  # Stage: test — format, lint, license check, pytest
  # --------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "src/data-module/uv.lock"

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Check formatting (black)
        run: uv run black --check .

      - name: Check import order (isort)
        run: uv run isort --check .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "src/data-module/uv.lock"

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "src/data-module/uv.lock"

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Check licenses
        run: uv run poe check_licenses

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true
          cache-dependency-glob: "src/data-module/uv.lock"

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run pytest
        run: uv run poe test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-data-module
          path: |
            src/data-module/coverage.xml
            src/data-module/htmlcov/

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-data-module
          path: src/data-module/python-junit.xml

  # --------------------------------------------------------------------------
  # Stage: provision — build & dev images (fast-path, no source needed)
  # --------------------------------------------------------------------------
  build-image:
    name: Docker — build stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: src/data-module
          file: src/data-module/Dockerfile
          target: build
          push: true
          build-args: |
            VENV_PATH=/opt/venv
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}/build:latest
            ${{ env.IMAGE_BASE }}/build:${{ github.ref_name }}_${{ github.run_number }}_${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/build:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/build:cache,mode=max

  build-dev-image:
    name: Docker — dev stage
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: src/data-module
          file: src/data-module/Dockerfile
          target: dev
          push: true
          build-args: |
            VENV_PATH=/opt/venv
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}/dev:latest
            ${{ env.IMAGE_BASE }}/dev:${{ github.ref_name }}_${{ github.run_number }}_${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_BASE }}/dev:cache
            type=registry,ref=${{ env.IMAGE_BASE }}/build:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/dev:cache,mode=max

  # --------------------------------------------------------------------------
  # Stage: build — runtime (production) image
  # --------------------------------------------------------------------------
  build-runtime-image:
    name: Docker — runtime stage
    runs-on: ubuntu-latest
    needs: [test, format, lint, license-check, build-image]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: src/data-module
          file: src/data-module/Dockerfile
          target: runtime
          push: true
          build-args: |
            VENV_PATH=/opt/venv
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}/runtime:latest
            ${{ env.IMAGE_BASE }}/runtime:${{ github.ref_name }}_${{ github.run_number }}_${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_BASE }}/runtime:cache
            type=registry,ref=${{ env.IMAGE_BASE }}/build:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/runtime:cache,mode=max
